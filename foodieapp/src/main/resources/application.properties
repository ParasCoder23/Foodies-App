spring.application.name=foodieapp

# Allow Render (or other platforms) to control the port via PORT env var
server.port=${PORT:8080}

#mongodb configuration
# Use a single environment variable MONGODB_URL for configuration.
# For local development the default is a local MongoDB instance. In production set MONGODB_URL in your host (Render/Heroku/etc).
spring.data.mongodb.uri=${MONGODB_URL:mongodb://127.0.0.1:27017/foodies}

#jwt configuration
# JWT secret should be provided via environment in production. Example env: JWT_SECRET_KEY
jwt.secret.key=${JWT_SECRET_KEY:}

#razorpay configuration
razorpay_key=${RAZORPAY_KEY:}
razorpay_secret=${RAZORPAY_SECRET:}

# Cloudinary - support multiple env var names (AP_KEY, CLOUD_NAME, API_SECRET, or CLOUDINARY_* or legacy lowercase)
cloudinary.cloud-name=${CLOUD_NAME:${CLOUDINARY_CLOUD_NAME:${cloud_name:}}}
cloudinary.api-key=${API_KEY:${CLOUDINARY_API_KEY:${api_key:}}}
cloudinary.api-secret=${API_SECRET:${CLOUDINARY_API_SECRET:${api_secret:}}}
