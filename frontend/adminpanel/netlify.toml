[build]
  command = "npm ci && npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production.environment]
  # Ensure Vite picks up the correct API URL in production (set in Netlify UI instead)
  # VITE_API_URL = "https://your-backend.example.com"
